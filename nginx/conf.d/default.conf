# Reverse proxy for local dev
# - http://localhost        -> Public Portfolio Gradio app
# - http://localhost/api/public and /api/v1 -> FastAPI backend
# - http://localhost/docs   -> FastAPI docs

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream freelance_backend {
    server backend:8000;
}

upstream freelance_public {
    server public_frontend:7860;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Backend API
    location /api/ {
        proxy_pass http://freelance_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Convenience: expose docs at the root domain
    location = /docs {
        proxy_pass http://freelance_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://freelance_backend/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public Portfolio frontend (Gradio)
    location / {
        proxy_pass http://freelance_public/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
