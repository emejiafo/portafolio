services:
  db:
    image: postgres:15
    container_name: freelance_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freelance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freelance_dev}
      POSTGRES_DB: ${POSTGRES_DB:-freelance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freelance}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freelance_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-freelance}:${POSTGRES_PASSWORD:-freelance_dev}@db:5432/${POSTGRES_DB:-freelance_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-freelance}:${POSTGRES_PASSWORD:-freelance_dev}@db:5432/${POSTGRES_DB:-freelance_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/data/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    init: true

  public_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freelance_public
    environment:
      API_BASE_URL: http://backend:8000
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      PORTFOLIO_SKY_IMAGES: ${PORTFOLIO_SKY_IMAGES:-/uploads/assets/sky/izta3.jpg,/uploads/assets/sky/izta1.jpg,/uploads/assets/sky/izta2.jpg}
    volumes:
      - ./frontend:/app
    ports:
      - "${PUBLIC_PORT:-7860}:7860"
    depends_on:
      - backend
    command: python -m public_app.main
    restart: unless-stopped
    init: true

  nginx:
    image: nginx:alpine
    container_name: freelance_nginx
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
      - public_frontend
    restart: unless-stopped

volumes:
  postgres_data: